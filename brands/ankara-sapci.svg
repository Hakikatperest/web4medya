<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100" fill="none" aria-label="Ankara Şapçı">
  <!-- Üst kıvrımlı şerit / kurdele efekti -->
  <path d="M 50 25 Q 150 15, 250 25" stroke="#000000" stroke-width="1.2" fill="none"/>
  <!-- Alt kıvrımlı şerit -->
  <path d="M 50 78 Q 150 88, 250 78" stroke="#000000" stroke-width="1.2" fill="none"/>

  <!-- Sol ve sağda dekoratif dolgu noktalar -->
  <circle cx="48" cy="50" r="3" fill="#000000"/>
  <circle cx="252" cy="50" r="3" fill="#000000"/>

  <!-- Sol yatay süsleme çizgisi -->
  <line x1="56" y1="50" x2="78" y2="50" stroke="#000000" stroke-width="0.7"/>
  <line x1="56" y1="52.5" x2="72" y2="52.5" stroke="#000000" stroke-width="0.7"/>

  <!-- Sağ yatay süsleme çizgisi -->
  <line x1="222" y1="50" x2="244" y2="50" stroke="#000000" stroke-width="0.7"/>
  <line x1="228" y1="52.5" x2="244" y2="52.5" stroke="#000000" stroke-width="0.7"/>

  <!-- Ana tipografi - serif / zanaatkar hissi -->
  <g fill="#000000" text-anchor="middle">
    <!-- Üstte küçük: EST. ANKARA -->
    <text x="150" y="38" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-weight="400" letter-spacing="4" font-style="italic">— ANKARA —</text>
    <!-- Altta büyük: ŞAPÇI -->
    <text x="150" y="68" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="700" letter-spacing="4">ŞAPÇI</text>
  </g>
</svg>
