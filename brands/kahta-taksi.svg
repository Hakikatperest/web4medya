<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100" fill="none" aria-label="Kahta Taksi">
  <!-- Sol tarafta büyük K monogram - daire içinde -->
  <circle cx="55" cy="50" r="28" fill="#000000"/>
  <text x="55" y="62" font-family="'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="-1">K</text>

  <!-- Sağ tarafta tipografi -->
  <g fill="#000000" font-family="'Helvetica Neue', Arial, sans-serif">
    <!-- KAHTA - büyük bold -->
    <text x="100" y="52" font-size="26" font-weight="800" letter-spacing="3">KAHTA</text>
    <!-- TAKSİ - ince, harfler arası geniş -->
    <text x="100" y="74" font-size="13" font-weight="300" letter-spacing="12">TAKSİ</text>
  </g>

  <!-- İnce dikey ayırıcı çizgi - monogram ile yazı arasında -->
  <line x1="90" y1="28" x2="90" y2="72" stroke="#000000" stroke-width="1"/>
</svg>
