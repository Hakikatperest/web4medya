<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100" fill="none" aria-label="Armin Tesisat">
  <g transform="translate(150, 50)">
    <!-- Üst yatay çizgi -->
    <line x1="-90" y1="-22" x2="90" y2="-22" stroke="#000000" stroke-width="2"/>
    <!-- Alt yatay çizgi -->
    <line x1="-90" y1="22" x2="90" y2="22" stroke="#000000" stroke-width="2"/>

    <!-- Tek satır tipografi - tam merkezde -->
    <g fill="#000000" font-family="'Helvetica Neue', Arial, sans-serif" text-anchor="middle" dominant-baseline="central">
      <text x="0" y="0" font-size="24" font-weight="900" letter-spacing="4">ARMİN TESİSAT</text>
    </g>
  </g>
</svg>
