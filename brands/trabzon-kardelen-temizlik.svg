<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100" fill="none" aria-label="Trabzon Kardelen Temizlik">
  <g transform="translate(150, 50)">
    <!-- Trabzon - üstte küçük -->
    <g fill="#000000" font-family="'Helvetica Neue', Arial, sans-serif" text-anchor="middle">
      <text x="0" y="-20" font-size="9" font-weight="600" letter-spacing="6" dominant-baseline="central">TRABZON</text>
    </g>

    <!-- Ana: KARDELEN -->
    <g fill="#000000" font-family="'Helvetica Neue', Arial, sans-serif" text-anchor="middle">
      <text x="0" y="5" font-size="26" font-weight="800" letter-spacing="2" dominant-baseline="central">KARDELEN</text>
    </g>

    <!-- Alt çizgi (ince) -->
    <line x1="-75" y1="18" x2="75" y2="18" stroke="#000000" stroke-width="0.6"/>

    <!-- Altta: TEMİZLİK -->
    <g fill="#000000" font-family="'Helvetica Neue', Arial, sans-serif" text-anchor="middle">
      <text x="0" y="30" font-size="11" font-weight="400" letter-spacing="10" dominant-baseline="central">TEMİZLİK</text>
    </g>
  </g>
</svg>
