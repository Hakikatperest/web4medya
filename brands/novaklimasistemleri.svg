<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100" fill="none" aria-label="Nova Klima Sistemleri">
  <g transform="translate(150, 50)">
    <!-- Sol: N harf monogram - daire içinde -->
    <circle cx="-110" cy="0" r="24" fill="#000000"/>
    <text x="-110" y="0" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="900" fill="#ffffff" text-anchor="middle" dominant-baseline="central" letter-spacing="-1">N</text>

    <!-- Sağ tipografi -->
    <g fill="#000000" font-family="'Helvetica Neue', Arial, sans-serif" dominant-baseline="central">
      <!-- NOVA - büyük -->
      <text x="-72" y="-8" font-size="24" font-weight="800" letter-spacing="4">NOVA</text>
      <!-- KLİMA SİSTEMLERİ - altta ince -->
      <text x="-72" y="14" font-size="9" font-weight="400" letter-spacing="6">KLİMA SİSTEMLERİ</text>
    </g>
  </g>
</svg>
