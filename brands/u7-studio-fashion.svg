<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100" fill="none" aria-label="U7 Studio Fashion">
  <g transform="translate(150, 50)">
    <!-- U7 - büyük bold monogram stil -->
    <text x="0" y="-10" font-family="'Helvetica Neue', Arial, sans-serif" font-size="40" font-weight="900" fill="#000000" text-anchor="middle" dominant-baseline="central" letter-spacing="-2">U7</text>

    <!-- Alt çizgi (çok ince) -->
    <line x1="-50" y1="10" x2="50" y2="10" stroke="#000000" stroke-width="0.5"/>

    <!-- STUDIO FASHION - altta küçük -->
    <text x="0" y="24" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" font-weight="400" fill="#000000" text-anchor="middle" dominant-baseline="central" letter-spacing="8">STUDIO FASHION</text>
  </g>
</svg>
