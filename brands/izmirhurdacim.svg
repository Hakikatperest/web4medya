<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100" fill="none" aria-label="İzmir Hurdacım">
  <g transform="translate(150, 50)">
    <!-- Sol: geri dönüşüm ok ikonu (basit) -->
    <g transform="translate(-110, 0)">
      <!-- 3 ok şekli oluşturan üçgen arrangement -->
      <path d="M -12 -12 L 0 -18 L 12 -12 L 6 -12 L 6 -6 L -6 -6 L -6 -12 Z" fill="#000000"/>
      <path d="M 14 6 L 16 -6 L 10 -6 L 10 0 L 4 10 L -2 4 L 0 14 L 12 14 Z" fill="#000000"/>
      <path d="M -14 6 L -12 14 L 0 14 L -4 8 L -10 0 L -10 -6 L -16 -6 Z" fill="#000000"/>
    </g>

    <!-- Ana tipografi -->
    <g fill="#000000" font-family="'Arial Black', 'Impact', sans-serif" dominant-baseline="central">
      <!-- İZMİR - küçük -->
      <text x="-80" y="-14" font-size="11" font-weight="900" letter-spacing="4" font-family="'Helvetica Neue', Arial, sans-serif">İZMİR</text>
      <!-- HURDACIM - büyük bold -->
      <text x="-80" y="12" font-size="26" font-weight="900" letter-spacing="2">HURDACIM</text>
    </g>
  </g>
</svg>
