<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100" fill="none" aria-label="Kaman Roof">
  <g transform="translate(150, 50)">
    <!-- Sol tarafta çatı silueti ikon -->
    <g transform="translate(-110, 0)">
      <!-- Üçgen çatı -->
      <path d="M -18 8 L 0 -14 L 18 8 Z" fill="none" stroke="#000000" stroke-width="2.5"/>
      <!-- Çatı içinde dikey çizgi (baca) -->
      <rect x="8" y="-8" width="3" height="6" fill="#000000"/>
      <!-- Altında ev gövdesi -->
      <rect x="-15" y="8" width="30" height="8" fill="none" stroke="#000000" stroke-width="2"/>
    </g>

    <!-- Ana tipografi -->
    <g fill="#000000" font-family="'Impact', 'Haettenschweiler', 'Arial Black', sans-serif" dominant-baseline="central">
      <text x="-80" y="-6" font-size="26" font-weight="900" letter-spacing="1">KAMAN</text>
      <text x="-80" y="18" font-size="16" font-weight="400" font-family="'Helvetica Neue', Arial, sans-serif" letter-spacing="12">ROOF</text>
    </g>
  </g>
</svg>
