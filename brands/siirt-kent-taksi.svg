<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100" fill="none" aria-label="Siirt Kent Taksi">
  <!-- Dış çerçeve (ince) -->
  <rect x="20" y="20" width="260" height="60" stroke="#000000" stroke-width="1.5" fill="none"/>
  <!-- İç çerçeve (kalın) -->
  <rect x="26" y="26" width="248" height="48" stroke="#000000" stroke-width="0.8" fill="none"/>

  <!-- Sol süsleme - klasik yıldızlar -->
  <g fill="#000000">
    <text x="38" y="56" font-family="serif" font-size="14" font-weight="400">★</text>
  </g>

  <!-- Sağ süsleme - klasik yıldızlar -->
  <g fill="#000000">
    <text x="254" y="56" font-family="serif" font-size="14" font-weight="400">★</text>
  </g>

  <!-- Ana tipografi - ortalanmış -->
  <g fill="#000000" font-family="'Helvetica Neue', Arial, sans-serif" text-anchor="middle">
    <!-- Üstte küçük: SİİRT -->
    <text x="150" y="44" font-size="10" font-weight="600" letter-spacing="5">SİİRT</text>
    <!-- Altta büyük: KENT TAKSİ -->
    <text x="150" y="66" font-size="20" font-weight="800" letter-spacing="2.5">KENT TAKSİ</text>
  </g>

  <!-- Orta süsleme - küçük ortalayıcı çizgiler -->
  <line x1="70" y1="49" x2="120" y2="49" stroke="#000000" stroke-width="0.6"/>
  <line x1="180" y1="49" x2="230" y2="49" stroke="#000000" stroke-width="0.6"/>
</svg>
