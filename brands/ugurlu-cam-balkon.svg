<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100" fill="none" aria-label="Uğurlu Cam Balkon">
  <g transform="translate(150, 50)">
    <!-- Sol: basit cam panel ikonu -->
    <g transform="translate(-115, 0)">
      <!-- Dış çerçeve -->
      <rect x="-12" y="-18" width="24" height="36" fill="none" stroke="#000000" stroke-width="1.8"/>
      <!-- İçi dikey bölme çizgisi -->
      <line x1="0" y1="-18" x2="0" y2="18" stroke="#000000" stroke-width="1.5"/>
    </g>

    <!-- Ana tipografi -->
    <g fill="#000000" font-family="'Helvetica Neue', Arial, sans-serif" dominant-baseline="central">
      <!-- UĞURLU - büyük bold -->
      <text x="-85" y="-12" font-size="22" font-weight="900" letter-spacing="2">UĞURLU</text>
      <!-- İnce ayırıcı çizgi -->
      <line x1="-85" y1="0" x2="115" y2="0" stroke="#000000" stroke-width="0.6"/>
      <!-- CAM BALKON - ince -->
      <text x="-85" y="13" font-size="14" font-weight="400" letter-spacing="5">CAM BALKON</text>
    </g>
  </g>
</svg>
