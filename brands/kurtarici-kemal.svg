<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100" fill="none" aria-label="Kurtarıcı Kemal">
  <g transform="translate(150, 50)">
    <!-- Sol: Kalkan amblem -->
    <g transform="translate(-115, 0)">
      <!-- Kalkan şekli - üstten geniş, altta sivri -->
      <path d="M -20 -22 L 20 -22 L 20 0 Q 20 16, 0 24 Q -20 16, -20 0 Z" fill="#000000"/>
      <!-- Kalkan içinde beyaz K harfi -->
      <text x="0" y="-2" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="900" fill="#ffffff" text-anchor="middle" dominant-baseline="central">K</text>
    </g>

    <!-- Sağ: tipografi -->
    <g fill="#000000" font-family="'Arial Black', 'Impact', sans-serif" dominant-baseline="central">
      <!-- KURTARICI -->
      <text x="-85" y="-10" font-size="20" font-weight="900" letter-spacing="3">KURTARICI</text>
      <!-- İnce ayırıcı çizgi -->
      <line x1="-85" y1="3" x2="115" y2="3" stroke="#000000" stroke-width="0.6"/>
      <!-- KEMAL - ince -->
      <text x="-85" y="16" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="300" letter-spacing="14">KEMAL</text>
    </g>
  </g>
</svg>
