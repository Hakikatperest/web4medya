<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100" fill="none" aria-label="SolarCleaning">
  <g transform="translate(150, 50)">
    <!-- Sol tarafta güneş ikonu -->
    <g transform="translate(-110, 0)">
      <!-- Merkez daire -->
      <circle cx="0" cy="0" r="8" fill="#000000"/>
      <!-- Güneş ışınları (8 çizgi) -->
      <line x1="0" y1="-17" x2="0" y2="-12" stroke="#000000" stroke-width="2"/>
      <line x1="0" y1="12" x2="0" y2="17" stroke="#000000" stroke-width="2"/>
      <line x1="-17" y1="0" x2="-12" y2="0" stroke="#000000" stroke-width="2"/>
      <line x1="12" y1="0" x2="17" y2="0" stroke="#000000" stroke-width="2"/>
      <line x1="-12" y1="-12" x2="-8.5" y2="-8.5" stroke="#000000" stroke-width="2"/>
      <line x1="8.5" y1="8.5" x2="12" y2="12" stroke="#000000" stroke-width="2"/>
      <line x1="12" y1="-12" x2="8.5" y2="-8.5" stroke="#000000" stroke-width="2"/>
      <line x1="-8.5" y1="8.5" x2="-12" y2="12" stroke="#000000" stroke-width="2"/>
    </g>

    <!-- Ana tipografi - tek satır, solar bold + cleaning ince -->
    <g fill="#000000" font-family="'Helvetica Neue', Arial, sans-serif" dominant-baseline="central">
      <text x="-85" y="0" font-size="26" font-weight="900" letter-spacing="-0.5">solar</text>
      <text x="-20" y="0" font-size="26" font-weight="200" letter-spacing="-0.5">cleaning</text>
    </g>
  </g>
</svg>
