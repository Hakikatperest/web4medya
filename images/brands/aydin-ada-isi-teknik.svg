<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100" fill="none" aria-label="Aydın Ada Isı Teknik">
  <g transform="translate(150, 50)">
    <!-- Üstte küçük: AYDIN -->
    <text x="0" y="-26" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" font-weight="600" fill="#000000" text-anchor="middle" letter-spacing="10" dominant-baseline="central">AYDIN</text>

    <!-- Ana: ADA ISI - büyük bold -->
    <text x="0" y="-5" font-family="'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="900" fill="#000000" text-anchor="middle" letter-spacing="3" dominant-baseline="central">ADA ISI</text>

    <!-- Ayırıcı çizgi -->
    <line x1="-90" y1="14" x2="90" y2="14" stroke="#000000" stroke-width="0.8"/>

    <!-- Altta: TEKNİK -->
    <text x="0" y="28" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="400" fill="#000000" text-anchor="middle" letter-spacing="12" dominant-baseline="central">TEKNİK</text>
  </g>
</svg>
