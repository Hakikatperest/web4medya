<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100" fill="none" aria-label="Birlik Nakliye">
  <!-- Soldaki kalın dikey çubuk -->
  <rect x="30" y="25" width="6" height="50" fill="#000000"/>

  <!-- Tipografi -->
  <g fill="#000000" font-family="'Helvetica Neue', Arial, sans-serif">
    <!-- Ana başlık: BİRLİK -->
    <text x="50" y="52" font-size="30" font-weight="900" letter-spacing="-0.5">BİRLİK</text>
    <!-- İkinci başlık: NAKLİYE -->
    <text x="50" y="76" font-size="14" font-weight="400" letter-spacing="10">N A K L İ Y E</text>
  </g>

  <!-- Sağ altta dekoratif küçük detay - hareket çizgileri -->
  <g fill="#000000">
    <rect x="230" y="48" width="30" height="2"/>
    <rect x="240" y="54" width="25" height="2"/>
    <rect x="252" y="60" width="18" height="2"/>
  </g>
</svg>
