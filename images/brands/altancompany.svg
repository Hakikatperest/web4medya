<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100" fill="none" aria-label="Altan Company">
  <g transform="translate(150, 50)">
    <!-- Üstte yatay kalın kısa çizgi -->
    <rect x="-30" y="-28" width="60" height="3" fill="#000000"/>

    <!-- Ana: ALTAN - büyük condensed -->
    <text x="0" y="-3" font-family="'Arial Narrow', 'Arial', sans-serif" font-size="32" font-weight="900" fill="#000000" text-anchor="middle" letter-spacing="8" dominant-baseline="central">ALTAN</text>

    <!-- Alt: COMPANY - ince -->
    <text x="0" y="22" font-family="'Arial Narrow', 'Arial', sans-serif" font-size="11" font-weight="300" fill="#000000" text-anchor="middle" letter-spacing="16" dominant-baseline="central">COMPANY</text>
  </g>
</svg>
