<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100" fill="none" aria-label="DİA Flowers">
  <g transform="translate(150, 50)">
    <!-- Dairesel çerçeve (ince, modern monogram) -->
    <circle cx="-70" cy="0" r="26" stroke="#000000" stroke-width="1" fill="none"/>

    <!-- Daire içinde DİA -->
    <text x="-70" y="0" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="500" fill="#000000" text-anchor="middle" dominant-baseline="central" letter-spacing="1">DİA</text>

    <!-- Sağda tipografi - dikey 2 satır -->
    <g fill="#000000" font-family="'Helvetica Neue', Arial, sans-serif">
      <!-- FLOWERS üst -->
      <text x="-32" y="-5" font-size="24" font-weight="200" letter-spacing="6">FLOWERS</text>
      <!-- İnce alt çizgi (ayırıcı) -->
      <line x1="-32" y1="5" x2="112" y2="5" stroke="#000000" stroke-width="0.5"/>
      <!-- Alt slogan - minimal -->
      <text x="-32" y="20" font-size="7" font-weight="400" letter-spacing="8">SINCE 2020</text>
    </g>
  </g>
</svg>
