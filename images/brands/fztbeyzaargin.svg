<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100" fill="none" aria-label="Fzt. Beyza Arğın">
  <g transform="translate(150, 50)">
    <!-- Üstte küçük: FZT. -->
    <text x="0" y="-22" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" font-weight="300" fill="#000000" text-anchor="middle" letter-spacing="8" dominant-baseline="central">FİZYOTERAPİST</text>

    <!-- Ana: Beyza Arğın - ince modern -->
    <text x="0" y="2" font-family="'Didot', 'Bodoni 72', 'Playfair Display', Georgia, serif" font-size="30" font-weight="300" fill="#000000" text-anchor="middle" letter-spacing="3" dominant-baseline="central">BEYZA ARĞIN</text>

    <!-- İnce ayırıcı çizgi -->
    <line x1="-70" y1="22" x2="70" y2="22" stroke="#000000" stroke-width="0.5"/>

    <!-- Alt: fzt. kısaltma -->
    <text x="0" y="32" font-family="'Helvetica Neue', Arial, sans-serif" font-size="7" font-weight="500" fill="#000000" text-anchor="middle" letter-spacing="4" dominant-baseline="central">FZT.</text>
  </g>
</svg>
