<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100" fill="none" aria-label="Diyetisyen Tuğba Şeker">
  <g transform="translate(150, 50)">
    <!-- Üstte küçük: DYT. -->
    <text x="0" y="-26" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" font-weight="500" fill="#000000" text-anchor="middle" letter-spacing="10" dominant-baseline="central">DİYETİSYEN</text>

    <!-- Ana: Tuğba Şeker - büyük script/elegant -->
    <text x="0" y="0" font-family="'Brush Script MT', 'Lucida Handwriting', cursive" font-size="32" font-weight="400" fill="#000000" text-anchor="middle" letter-spacing="1" dominant-baseline="central" font-style="italic">Tuğba Şeker</text>

    <!-- İki yanda ince çizgiler - zarafet -->
    <line x1="-120" y1="20" x2="-40" y2="20" stroke="#000000" stroke-width="0.5"/>
    <line x1="40" y1="20" x2="120" y2="20" stroke="#000000" stroke-width="0.5"/>

    <!-- Alt: BESLENME UZMANI -->
    <text x="0" y="27" font-family="'Helvetica Neue', Arial, sans-serif" font-size="8" font-weight="400" fill="#000000" text-anchor="middle" letter-spacing="6" dominant-baseline="central">BESLENME UZMANI</text>
  </g>
</svg>
