<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100" fill="none" aria-label="Alya İlaçlama">
  <g transform="translate(150, 50)">
    <!-- Sol ve sağda kıvrık tire süsleri -->
    <text x="-115" y="0" font-family="Georgia, serif" font-size="28" font-weight="400" fill="#000000" text-anchor="middle" dominant-baseline="central" font-style="italic">~</text>
    <text x="115" y="0" font-family="Georgia, serif" font-size="28" font-weight="400" fill="#000000" text-anchor="middle" dominant-baseline="central" font-style="italic">~</text>

    <!-- Ana: Alya - büyük serif italic -->
    <text x="0" y="-8" font-family="Georgia, 'Times New Roman', serif" font-size="32" font-weight="700" fill="#000000" text-anchor="middle" dominant-baseline="central" font-style="italic">Alya</text>

    <!-- Alt: İLAÇLAMA - küçük sans -->
    <text x="0" y="22" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" font-weight="500" fill="#000000" text-anchor="middle" letter-spacing="10" dominant-baseline="central">İLAÇLAMA</text>
  </g>
</svg>
